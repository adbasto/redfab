[stepper_x]
endstop_pin: ^PG6        # ^ = включить pull-up резистор (нужен для мех. концевиков)
position_endstop: 0
position_min: 0
position_max: 300        # твой размер по X

[stepper_y]
endstop_pin: ^PG9
position_endstop: 0
position_min: 0
position_max: 300        # твой размер по Y

[stepper_z]
endstop_pin: ^PG10
position_endstop: 0
position_min: -2
position_max: 350        # твой размер по Z