[gcode_macro INFO]
gcode:
    RESPOND MSG="========================================"

    {% if printer.mcu is defined %}
        RESPOND MSG="MCU версия: {printer.mcu.mcu_version}"
    {% else %}
        RESPOND MSG="MCU: НЕ ПОДКЛЮЧЕН"
    {% endif %}

    {% if printer.print_stats is defined %}
        RESPOND MSG="Статус печати: {printer.print_stats.state}"
    {% else %}
        RESPOND MSG="Статус печати: НЕДОСТУПЕН"
    {% endif %}

    RESPOND MSG="--- СИСТЕМА ---"

    {% if printer['heater_fan hotend_fan'] is defined %}
        RESPOND MSG="Вентилятор хотенда: {(printer['heater_fan hotend_fan'].speed * 100)|round(0)}%"
    {% else %}
        RESPOND MSG="Вентилятор хотенда: НЕ НАСТРОЕН"
    {% endif %}

    {% if printer.fan is defined %}
        RESPOND MSG="Обдув модели: {(printer.fan.speed * 100)|round(0)}%"
    {% else %}
        RESPOND MSG="Обдув модели: НЕ НАСТРОЕН"
    {% endif %}

    RESPOND MSG="--- ВЕНТИЛЯТОРЫ ---"

    {% if printer.query_endstops is defined %}
        {% set es = printer.query_endstops.last_query %}
        {% if es %}
            {% for name, state in es.items() %}
                RESPOND MSG="{name}: {'СРАБОТАЛ' if state else 'открыт'}"
            {% endfor %}
        {% else %}
            RESPOND MSG="Запусти QUERY_ENDSTOPS для обновления"
        {% endif %}
    {% else %}
        RESPOND MSG="Концевики: ДАННЫЕ НЕДОСТУПНЫ"
    {% endif %}

    RESPOND MSG="--- КОНЦЕВИКИ ---"

    {% if printer.toolhead is defined %}
        {% set homed = printer.toolhead.homed_axes %}
        {% if 'z' in homed %}
            RESPOND MSG="Z: выполнен ✓"
        {% else %}
            RESPOND MSG="Z: НЕ ВЫПОЛНЕН"
        {% endif %}
        {% if 'y' in homed %}
            RESPOND MSG="Y: выполнен ✓"
        {% else %}
            RESPOND MSG="Y: НЕ ВЫПОЛНЕН"
        {% endif %}
        {% if 'x' in homed %}
            RESPOND MSG="X: выполнен ✓"
        {% else %}
            RESPOND MSG="X: НЕ ВЫПОЛНЕН"
        {% endif %}
    {% else %}
        RESPOND MSG="Хоминг: ДАННЫЕ НЕДОСТУПНЫ"
    {% endif %}

    RESPOND MSG="--- ХОМИНГ ---"

    {% if printer.toolhead is defined %}
        RESPOND MSG="E: {printer.toolhead.position.e|round(2)} мм"
        RESPOND MSG="Z: {printer.toolhead.position.z|round(2)} мм"
        RESPOND MSG="Y: {printer.toolhead.position.y|round(2)} мм"
        RESPOND MSG="X: {printer.toolhead.position.x|round(2)} мм"
    {% else %}
        RESPOND MSG="Позиция: НЕДОСТУПНА"
    {% endif %}

    RESPOND MSG="--- ПОЗИЦИЯ ОСЕЙ ---"

    {% if printer['temperature_sensor hotend'] is defined %}
        RESPOND MSG="Доп.датчик хотенда: {printer['temperature_sensor hotend'].temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="Доп.датчик хотенда: ОТСУТСТВУЕТ"
    {% endif %}

    {% if printer['temperature_sensor raspberry_pi'] is defined %}
        RESPOND MSG="Raspberry: {printer['temperature_sensor raspberry_pi'].temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="Raspberry: ДАТЧИК ОТСУТСТВУЕТ"
    {% endif %}

    {% if printer.heater_bed is defined %}
        RESPOND MSG="Стол:      {printer.heater_bed.temperature|round(1)}°C / {printer.heater_bed.target|round(1)}°C (цель)"
    {% else %}
        RESPOND MSG="Стол:      НЕ НАСТРОЕН"
    {% endif %}

    {% if printer.extruder is defined %}
        RESPOND MSG="Хотенд:    {printer.extruder.temperature|round(1)}°C / {printer.extruder.target|round(1)}°C (цель)"
    {% else %}
        RESPOND MSG="Хотенд:    НЕ НАСТРОЕН"
    {% endif %}

    RESPOND MSG="--- ТЕМПЕРАТУРЫ ---"
    RESPOND MSG="       ИНФОРМАЦИЯ О ПРИНТЕРЕ"
    RESPOND MSG="========================================"


[gcode_macro INFO_HD] # INFO HARDWARE
gcode:
    RESPOND MSG="========================================"
    RESPOND MSG="  АППАРАТНАЯ КОНФИГУРАЦИЯ ПРИНТЕРА"
    RESPOND MSG="========================================"

    # ============================================================
    # MCU
    # ============================================================
    RESPOND MSG="--- MCU / ПЛАТА ---"
    {% if printer.mcu is defined %}
        RESPOND MSG="Плата:      ПОДКЛЮЧЕНА ✓"
        RESPOND MSG="Версия MCU: {printer.mcu.mcu_version}"
        RESPOND MSG="Частота:    {printer.mcu.mcu_freq} Гц"
        RESPOND MSG="Пин Serial: /dev/serial/by-id/..."
    {% else %}
        RESPOND MSG="Плата: НЕ ПОДКЛЮЧЕНА ✗"
    {% endif %}

    # ============================================================
    # МОТОРЫ
    # ============================================================
    RESPOND MSG="--- МОТОРЫ ---"

    {% if printer.configfile.settings.stepper_x is defined %}
        {% set sx = printer.configfile.settings.stepper_x %}
        RESPOND MSG="[X] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {sx.step_pin} | DIR: {sx.dir_pin} | EN: {sx.enable_pin}"
        RESPOND MSG="    Микрошаги: {sx.microsteps} | rotation_distance: {sx.rotation_distance}"
        RESPOND MSG="    Концевик: {sx.endstop_pin} | Макс: {sx.position_max} мм"
    {% else %}
        RESPOND MSG="[X] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.stepper_y is defined %}
        {% set sy = printer.configfile.settings.stepper_y %}
        RESPOND MSG="[Y] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {sy.step_pin} | DIR: {sy.dir_pin} | EN: {sy.enable_pin}"
        RESPOND MSG="    Микрошаги: {sy.microsteps} | rotation_distance: {sy.rotation_distance}"
        RESPOND MSG="    Концевик: {sy.endstop_pin} | Макс: {sy.position_max} мм"
    {% else %}
        RESPOND MSG="[Y] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.stepper_z is defined %}
        {% set sz = printer.configfile.settings.stepper_z %}
        RESPOND MSG="[Z1] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {sz.step_pin} | DIR: {sz.dir_pin} | EN: {sz.enable_pin}"
        RESPOND MSG="    Микрошаги: {sz.microsteps} | rotation_distance: {sz.rotation_distance}"
        RESPOND MSG="    Концевик: {sz.endstop_pin} | Макс: {sz.position_max} мм"
    {% else %}
        RESPOND MSG="[Z1] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.stepper_z1 is defined %}
        {% set sz1 = printer.configfile.settings.stepper_z1 %}
        RESPOND MSG="[Z2] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {sz1.step_pin} | DIR: {sz1.dir_pin} | EN: {sz1.enable_pin}"
        RESPOND MSG="    Микрошаги: {sz1.microsteps} | rotation_distance: {sz1.rotation_distance}"
    {% else %}
        RESPOND MSG="[Z2] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.stepper_z2 is defined %}
        {% set sz2 = printer.configfile.settings.stepper_z2 %}
        RESPOND MSG="[Z3] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {sz2.step_pin} | DIR: {sz2.dir_pin} | EN: {sz2.enable_pin}"
        RESPOND MSG="    Микрошаги: {sz2.microsteps} | rotation_distance: {sz2.rotation_distance}"
    {% else %}
        RESPOND MSG="[Z3] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.extruder is defined %}
        {% set ex = printer.configfile.settings.extruder %}
        RESPOND MSG="[Экструдер] НАСТРОЕН ✓"
        RESPOND MSG="    STEP: {ex.step_pin} | DIR: {ex.dir_pin} | EN: {ex.enable_pin}"
        RESPOND MSG="    Микрошаги: {ex.microsteps} | rotation_distance: {ex.rotation_distance}"
        RESPOND MSG="    Сопло: {ex.nozzle_diameter} мм | Филамент: {ex.filament_diameter} мм"
    {% else %}
        RESPOND MSG="[Экструдер] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.extruder1 is defined %}
        RESPOND MSG="[Экструдер 2] НАСТРОЕН ✓"
    {% else %}
        RESPOND MSG="[Экструдер 2] не настроен"
    {% endif %}

    # ============================================================
    # ДРАЙВЕРЫ TMC
    # ============================================================
    RESPOND MSG="--- ДРАЙВЕРЫ TMC ---"

    {% if printer.configfile.settings['tmc5160 stepper_x'] is defined %}
        {% set tx = printer.configfile.settings['tmc5160 stepper_x'] %}
        RESPOND MSG="[X]  TMC5160 ✓ | CS: {tx.cs_pin} | Ток: {tx.run_current}А | Шунт: {tx.sense_resistor} Ом"
    {% elif printer.configfile.settings['tmc2209 stepper_x'] is defined %}
        {% set tx = printer.configfile.settings['tmc2209 stepper_x'] %}
        RESPOND MSG="[X]  TMC2209 ✓ | UART: {tx.uart_pin} | Ток: {tx.run_current}А"
    {% else %}
        RESPOND MSG="[X]  драйвер не настроен (управление без обратной связи)"
    {% endif %}

    {% if printer.configfile.settings['tmc5160 stepper_y'] is defined %}
        {% set ty = printer.configfile.settings['tmc5160 stepper_y'] %}
        RESPOND MSG="[Y]  TMC5160 ✓ | CS: {ty.cs_pin} | Ток: {ty.run_current}А"
    {% elif printer.configfile.settings['tmc2209 stepper_y'] is defined %}
        {% set ty = printer.configfile.settings['tmc2209 stepper_y'] %}
        RESPOND MSG="[Y]  TMC2209 ✓ | UART: {ty.uart_pin} | Ток: {ty.run_current}А"
    {% else %}
        RESPOND MSG="[Y]  драйвер не настроен"
    {% endif %}

    {% if printer.configfile.settings['tmc5160 stepper_z'] is defined %}
        {% set tz = printer.configfile.settings['tmc5160 stepper_z'] %}
        RESPOND MSG="[Z1] TMC5160 ✓ | CS: {tz.cs_pin} | Ток: {tz.run_current}А"
    {% elif printer.configfile.settings['tmc2209 stepper_z'] is defined %}
        {% set tz = printer.configfile.settings['tmc2209 stepper_z'] %}
        RESPOND MSG="[Z1] TMC2209 ✓ | UART: {tz.uart_pin} | Ток: {tz.run_current}А"
    {% else %}
        RESPOND MSG="[Z1] драйвер не настроен"
    {% endif %}

    {% if printer.configfile.settings['tmc5160 stepper_z1'] is defined %}
        {% set tz1 = printer.configfile.settings['tmc5160 stepper_z1'] %}
        RESPOND MSG="[Z2] TMC5160 ✓ | CS: {tz1.cs_pin} | Ток: {tz1.run_current}А"
    {% else %}
        RESPOND MSG="[Z2] драйвер не настроен"
    {% endif %}

    {% if printer.configfile.settings['tmc5160 stepper_z2'] is defined %}
        {% set tz2 = printer.configfile.settings['tmc5160 stepper_z2'] %}
        RESPOND MSG="[Z3] TMC5160 ✓ | CS: {tz2.cs_pin} | Ток: {tz2.run_current}А"
    {% else %}
        RESPOND MSG="[Z3] драйвер не настроен"
    {% endif %}

    {% if printer.configfile.settings['tmc5160 extruder'] is defined %}
        {% set te = printer.configfile.settings['tmc5160 extruder'] %}
        RESPOND MSG="[E]  TMC5160 ✓ | CS: {te.cs_pin} | Ток: {te.run_current}А"
    {% elif printer.configfile.settings['tmc2209 extruder'] is defined %}
        {% set te = printer.configfile.settings['tmc2209 extruder'] %}
        RESPOND MSG="[E]  TMC2209 ✓ | UART: {te.uart_pin} | Ток: {te.run_current}А"
    {% else %}
        RESPOND MSG="[E]  драйвер не настроен"
    {% endif %}

    # ============================================================
    # НАГРЕВАТЕЛИ И ДАТЧИКИ ТЕМПЕРАТУРЫ
    # ============================================================
    RESPOND MSG="--- НАГРЕВАТЕЛИ И ДАТЧИКИ ---"

    {% if printer.configfile.settings.extruder is defined %}
        {% set ex = printer.configfile.settings.extruder %}
        RESPOND MSG="[Хотенд] НАСТРОЕН ✓"
        RESPOND MSG="    Нагреватель: {ex.heater_pin} | Датчик: {ex.sensor_pin}"
        RESPOND MSG="    Тип датчика: {ex.sensor_type}"
        RESPOND MSG="    Диапазон: {ex.min_temp}°C — {ex.max_temp}°C"
        RESPOND MSG="    Сейчас: {printer.extruder.temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="[Хотенд] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings.heater_bed is defined %}
        {% set hb = printer.configfile.settings.heater_bed %}
        RESPOND MSG="[Стол] НАСТРОЕН ✓"
        RESPOND MSG="    Нагреватель: {hb.heater_pin} | Датчик: {hb.sensor_pin}"
        RESPOND MSG="    Тип датчика: {hb.sensor_type}"
        RESPOND MSG="    Диапазон: {hb.min_temp}°C — {hb.max_temp}°C"
        RESPOND MSG="    Сейчас: {printer.heater_bed.temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="[Стол] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer['temperature_sensor raspberry_pi'] is defined %}
        RESPOND MSG="[Raspberry Pi] ДАТЧИК ✓ | Сейчас: {printer['temperature_sensor raspberry_pi'].temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="[Raspberry Pi] датчик не настроен"
    {% endif %}

    {% if printer['temperature_sensor hotend'] is defined %}
        RESPOND MSG="[Доп.датчик hotend] ✓ | Сейчас: {printer['temperature_sensor hotend'].temperature|round(1)}°C"
    {% else %}
        RESPOND MSG="[Доп.датчик hotend] не настроен"
    {% endif %}

    # ============================================================
    # ВЕНТИЛЯТОРЫ
    # ============================================================
    RESPOND MSG="--- ВЕНТИЛЯТОРЫ ---"

    {% if printer.configfile.settings.fan is defined %}
        {% set f = printer.configfile.settings.fan %}
        RESPOND MSG="[Обдув модели] НАСТРОЕН ✓ | Пин: {f.pin} | Сейчас: {(printer.fan.speed * 100)|round(0)}%"
    {% else %}
        RESPOND MSG="[Обдув модели] НЕ НАСТРОЕН ✗"
    {% endif %}

    {% if printer.configfile.settings['heater_fan hotend_fan'] is defined %}
        {% set hf = printer.configfile.settings['heater_fan hotend_fan'] %}
        RESPOND MSG="[Вент.хотенда] НАСТРОЕН ✓ | Пин: {hf.pin} | Включается от: {hf.heater_temp}°C"
    {% else %}
        RESPOND MSG="[Вент.хотенда] не настроен"
    {% endif %}

    {% if printer.configfile.settings['controller_fan electronics_fan'] is defined %}
        {% set cf = printer.configfile.settings['controller_fan electronics_fan'] %}
        RESPOND MSG="[Вент.платы]   НАСТРОЕН ✓ | Пин: {cf.pin}"
    {% else %}
        RESPOND MSG="[Вент.платы]   не настроен"
    {% endif %}

    # ============================================================
    # ЗОНД / АВТОЛЕВЕЛИНГ
    # ============================================================
    RESPOND MSG="--- ЗОНД / АВТОЛЕВЕЛИНГ ---"

    {% if printer.configfile.settings.bltouch is defined %}
        {% set bt = printer.configfile.settings.bltouch %}
        RESPOND MSG="[BLTouch] НАСТРОЕН ✓"
        RESPOND MSG="    Сигнал: {bt.sensor_pin} | Управление: {bt.control_pin}"
        RESPOND MSG="    Z-offset: {bt.z_offset} мм"
    {% else %}
        RESPOND MSG="[BLTouch] не настроен"
    {% endif %}

    {% if printer.configfile.settings.probe is defined %}
        {% set pr = printer.configfile.settings.probe %}
        RESPOND MSG="[Probe] НАСТРОЕН ✓ | Пин: {pr.pin} | Z-offset: {pr.z_offset} мм"
    {% else %}
        RESPOND MSG="[Probe] не настроен"
    {% endif %}

    {% if printer.configfile.settings.z_tilt is defined %}
        RESPOND MSG="[Z_TILT] НАСТРОЕН ✓ — выравнивание 3 Z-моторов активно"
    {% else %}
        RESPOND MSG="[Z_TILT] не настроен"
    {% endif %}

    # ============================================================
    # ДИСПЛЕЙ
    # ============================================================
    RESPOND MSG="--- ДИСПЛЕЙ ---"

    {% if printer.configfile.settings.display is defined %}
        {% set dp = printer.configfile.settings.display %}
        RESPOND MSG="[Дисплей] НАСТРОЕН ✓ | Тип: {dp.lcd_type}"
    {% else %}
        RESPOND MSG="[Дисплей] не настроен"
    {% endif %}

    # ============================================================
    # ПОДСВЕТКА
    # ============================================================
    RESPOND MSG="--- ПОДСВЕТКА ---"

    {% if printer.configfile.settings['neopixel my_neopixel'] is defined %}
        RESPOND MSG="[NeoPixel] НАСТРОЕН ✓"
    {% else %}
        RESPOND MSG="[NeoPixel] не настроен"
    {% endif %}

    RESPOND MSG="========================================"
    RESPOND MSG="  Вызови INFO для текущих показателей"
    RESPOND MSG="========================================"