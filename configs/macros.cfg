# ============================================================
# macros.cfg — пользовательские макросы и homing_override
# ============================================================

# Переопределяет стандартный G28
# Последовательность: G28 X → G28 Y → переехать под Z концевик → G28 Z
[homing_override]
axes: xyz
gcode:
    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set home_all = not home_x and not home_y and not home_z %}

    # Хоминг X
    {% if home_all or home_x %}
        G28 X
    {% endif %}

    # Хоминг Y
    {% if home_all or home_y %}
        G28 Y
    {% endif %}

    # Хоминг Z — сначала встать под концевик, потом поднимать стол
    {% if home_all or home_z %}
        # После G28 X Y: X=0 (левый), Y=350 (задний)
        # Z концевик: 9мм от левого края → X=9, 27мм от переднего края → Y=27
        G90
        G1 X9 Y27 F3000
        G28 Z
    {% endif %}
