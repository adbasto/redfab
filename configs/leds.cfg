# ============================================================
# leds.cfg — адресная лента WS2812B (Neopixel)
# Разъём: Neopixel header на Octopus v1.1
# Пин: PB0 (Signal), питание 5V от платы
# Лента: WS2812B, 30 светодиодов, GRB
# ============================================================

[neopixel case_light]
pin: PB0
chain_count: 30
color_order: GRB
initial_RED: 1.0
initial_GREEN: 0.3
initial_BLUE: 0.0
