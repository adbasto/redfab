# This file contains common pin mappings for the BigTreeTech OctoPus V1.
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# after running "make", copy the generated "klipper/out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the OctoPus with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# 2023.01.19 - Modified for the FreeStyle Printer
#            - Starting with the STM32F466's USB ID
# 2023.01.20 - Firmware updated on Octopus and FLY SHT 42 at latest level
#            - Raspberry Pi Temperature Sensor Added
#            - Added Basic "virtual_sdcard", "pause_resume", "display_status" "bed_mesh" & "idle_timeout" Mainsail references
#            - Added Basic "PAUSE", "RESUME", "CANCEL_PRINT", "_TOOLHEAD_PARK_CANCEL" & "BED_MESH_CALIBRATE" macros
#            - Specified X & Y Axis Stepper Drivers with Stallguard
#            - Specified Z Axis Stepper Drivers with *hopefully* using BL Touch automagically
#            - Specified "save_z_home" for BL Touch
#            - Specified "quad_gantry_level"
# 2023.01.21 - Setting the Z Axis to center with BL Touch Offset
#            - Setting the quad gantry leveling positions
# 2023.01.22 - Replaced the Toolhead to bring the BL Touch down by 2mm
#            - Changed the Quad Gantry Level Z Move to 10mm
#            - Tried to change the Quad Gantry Level Retry Tolerance to 0.075mm (from 0.0075mm which is the Voron 2.4 R2 Specification)
#              - Original seems to be possible
#            - Reset the Mesh Coordinates
# 2023.01.23 - Calibrating the X/Y Axis and BL Touch Offset
# 2023.01.25 - Moved in bltouch statement from canFly to be allow Klipper to update it
# 2023.01.27 - Trying out Resonance Testing

