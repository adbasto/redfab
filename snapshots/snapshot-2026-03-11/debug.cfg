[force_move]
enable_force_move: True

[gcode_macro PROBE_STATE]
description: Показать состояние датчика Z
gcode:
    QUERY_PROBE
    {% if printer.probe.last_query %}
        RESPOND TYPE=echo MSG="PROBE: TRIGGERED (сработал)"
    {% else %}
        RESPOND TYPE=echo MSG="PROBE: open (свободен)"
    {% endif %}

[gcode_macro TEST_HOME_X]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=y MOVE=50 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=x MOVE=-50 SPEED=10 STOP_ON_ENDSTOP=1  SYNC=1
    
    RESPOND MSG="X endstop hit - both stopped!"