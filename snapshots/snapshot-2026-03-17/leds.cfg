# ============================================================
# leds.cfg — адресная лента WS2812B (Neopixel)
# Разъём: Neopixel header на Octopus v1.1, пин PB0, 5V
# Лента: WS2812B, 30 светодиодов, GRB
#
# Цветовая схема состояний принтера:
#   Оранжевый — включён, не откалиброван
#   Жёлтый    — хоминг / калибровка
#   Зелёный   — готов к печати
#   Прогресс  — во время печати: N зелёных LED из 30
#   Синий     — пауза
#   Красный   — авария
# ============================================================

[neopixel case_light]
pin: PB0
chain_count: 4
color_order: GRB
initial_RED: 1.0        # оранжевый при включении = не откалиброван
initial_GREEN: 0.3
initial_BLUE: 0.0

# ============================================================
# Статусные макросы
# ============================================================

[gcode_macro _LED_ORANGE]
description: Включён, не откалиброван
gcode:
    SET_LED LED=case_light RED=1.0 GREEN=0.3 BLUE=0.0

[gcode_macro _LED_YELLOW]
description: Хоминг / калибровка
gcode:
    SET_LED LED=case_light RED=1.0 GREEN=0.8 BLUE=0.0

[gcode_macro _LED_GREEN]
description: Готов к печати
gcode:
    SET_LED LED=case_light RED=0.0 GREEN=1.0 BLUE=0.0

[gcode_macro _LED_BLUE]
description: Пауза
gcode:
    SET_LED LED=case_light RED=0.0 GREEN=0.0 BLUE=1.0

[gcode_macro _LED_RED]
description: Авария
gcode:
    SET_LED LED=case_light RED=1.0 GREEN=0.0 BLUE=0.0

# ============================================================
# Прогресс-бар: N зелёных LED из 30 по проценту печати
# ============================================================

[gcode_macro _LED_PROGRESS]
description: Прогресс-бар — зелёный=напечатано, синий=ожидание
gcode:
    {% set progress = printer.print_stats.progress | default(0) | float %}
    {% set total = 4 %}
    {% set lit = [[( progress * total ) | round(0, 'ceil') | int, 1] | max, total] | min %}
    {% for i in range(1, total + 1) %}
        {% if i <= lit %}
            SET_LED LED=case_light RED=0.0 GREEN=1.0 BLUE=0.0 INDEX={i} TRANSMIT={ 1 if i == total else 0 }
        {% else %}
            SET_LED LED=case_light RED=0.0 GREEN=0.0 BLUE=0.15 INDEX={i} TRANSMIT={ 1 if i == total else 0 }
        {% endif %}
    {% endfor %}

# ============================================================
# Цикл обновления прогресса (каждые 3 сек во время печати)
# Запускается из PRINT_START, останавливается сам по state
# ============================================================

[delayed_gcode _LED_LOOP]
gcode:
    {% set state = printer.print_stats.state %}
    {% if state == "printing" %}
        _LED_PROGRESS
        UPDATE_DELAYED_GCODE ID=_LED_LOOP DURATION=3
    {% elif state == "paused" %}
        _LED_BLUE
    {% elif state == "complete" %}
        _LED_GREEN
    {% elif state == "error" %}
        _LED_RED
    {% endif %}

[gcode_macro PAUSE]
rename_existing: _PAUSE_BASE
description: Пауза печати — лента синяя
gcode:
    _PAUSE_BASE {rawparams}
    _LED_BLUE

[gcode_macro RESUME]
rename_existing: _RESUME_BASE
description: Продолжить печать — возобновить прогресс-бар
gcode:
    _RESUME_BASE {rawparams}
    _LED_PROGRESS
    UPDATE_DELAYED_GCODE ID=_LED_LOOP DURATION=3
