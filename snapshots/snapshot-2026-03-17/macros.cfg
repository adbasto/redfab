# ============================================================
# macros.cfg — пользовательские макросы и homing_override
# ============================================================

# Переопределяет стандартный G28
# Полная последовательность (G28 без параметров):
#   1. G28 X → отъезд к X=0
#   2. G28 Y
#   3. G28 X повторно (фиксация XY)
#   4. Парковка X=285 Y=0
#   5. Нагрев сопла до 230°C
#   6. Чистка сопла: 10 циклов Y=420..440
#   7b. Выключить нагрев
#   8. Если Z концевик не нажат — опустить стол на 20мм
#   9. Встать под Z концевик X=-25 Y=114
#   10. G28 Z
#   11. Парковка X=285 Y=0 Z=5
[homing_override]
axes: xyz
set_position_z: 0   # разрешает G1 Z до реального хоминга
gcode:
    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set home_all = not home_x and not home_y and not home_z %}

    _LED_YELLOW     # жёлтый — идёт калибровка

    # 0) Опустить стол перед хомингом XY
    {% if home_all or home_x or home_y %}
        _LOWER_Z_SAFE
    {% endif %}

    # 1) Хоминг X → отъезд к X=0
    {% if home_all or home_x %}
        G4 P1500    ; пауза — StallGuard фильтр устаивается
        G28 X
        G90
        G1 X0 F3000
    {% endif %}

    # 2) Хоминг Y → отъезд к Y=440
    {% if home_all or home_y %}
        G4 P1500
        G28 Y
        G90
        G1 Y440 F1000
    {% endif %}

    # 3) Повторный хоминг X (фиксация XY)
    {% if home_all %}
        G4 P1500
        G28 X
    {% endif %}

    # 4) Парковка после XY
    {% if home_all %}
        G90
        G1 X285 Y0 F3000
    {% endif %}

    # 5) Нагрев сопла до 230°C
    {% if home_all %}
        M104 S230
        M109 S230   ; ждать достижения температуры
    {% endif %}

    # 6) Чистка сопла: 10 раз между Y=420 и Y=440
    # 7b) Выключить нагрев
    {% if home_all %}
        G90
        {% for i in range(10) %}
            G1 Y420 F6000
            G1 Y440 F6000
        {% endfor %}
        M104 S0     ; выключить нагрев сопла
    {% endif %}

    # 9) Встать под Z концевик
    {% if home_all or home_z %}
        G90
        G1 X-25 Y114 F3000
    {% endif %}

    # 10) Хоминг Z
    {% if home_all or home_z %}
        G28 Z
    {% endif %}

    # 11) Парковка
    {% if home_all %}
        G90
        G1 X285 Y0 F3000
        G1 Z5 F300
    {% endif %}

    _LED_GREEN      # зелёный — готов к печати

# ============================================================
# START_PRINT / END_PRINT — вызываются из слайсера
#
# Слайсер → Start G-code:
#   START_PRINT BED_TEMP=[first_layer_bed_temperature] EXTRUDER_TEMP=[first_layer_temperature]
#
# Слайсер → End G-code:
#   END_PRINT
# ============================================================

[gcode_macro PRINT_START]
description: Начало печати — нагрев, хоминг, очистительная линия
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    _LED_YELLOW

    # 1) Запустить нагрев стола сразу (греется пока идёт хоминг)
    M140 S{BED_TEMP}        ; запустить нагрев стола (не ждать)

    # 2) Хоминг (опускание стола внутри — первый шаг homing_override)
    G28

    # 3) Ждать нагрева после хоминга
    M109 S{EXTRUDER_TEMP}   ; ждать экструдер
    M190 S{BED_TEMP}        ; ждать стол

    # 4) Прайм — продавить 30мм медленно, убрать натёкшее ретрактом
    G90
    G1 X285 Y0 Z5 F5000     ; позиция для прайма
    G92 E0
    G1 E30 F150             ; продавить 3 см медленно (5 мм/с)
    G1 E-2 F600             ; небольшой ретракт — убрать каплю
    G4 P1000                ; пауза 1 сек

    # 5) Очистительная линия — 2 прохода со смещением 0.5мм
    ; Проход 1 (X=0, Y=20→120, Z=0.3)
    G92 E0
    G1 X0 Y20 Z0.3 F5000
    G1 Y120 E18 F1000

    ; Проход 2 со смещением X=0.5мм (рядом с первым)
    G92 E0
    G1 X0.5 F3000
    G1 Y20 E18 F1000

    G92 E0                  ; обнулить счётчик экструдера
    G1 Z2 F300              ; поднять сопло — безопасная высота для слайсера

    _LED_PROGRESS
    UPDATE_DELAYED_GCODE ID=_LED_LOOP DURATION=3

# ============================================================

[gcode_macro PRINT_END]
description: Конец печати — парковка, охлаждение, отключение
gcode:
    # 1) Ретракт и подъём (опустить стол, не выходя за position_max)
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    G91
    G1 E-3 F1800            ; ретракт 3мм
    G90
    G1 X285 Y0 F6000        ; парковка головы
    G1 Z{max_z} F300        ; опустить стол максимально вниз

    # 3) Выключить нагрев, вентилятор, моторы
    M104 S0                 ; выключить экструдер
    M140 S0                 ; выключить стол
    M106 S0                 ; выключить вентилятор обдува
    M84                     ; выключить моторы

    # 4) Индикация — оранжевый = ожидание следующей печати
    UPDATE_DELAYED_GCODE ID=_LED_LOOP DURATION=0
    _LED_ORANGE

# ============================================================
# Опускает стол по 1мм (макс 20мм), останавливается при срабатывании Z концевика
# Использует for-цикл вместо рекурсии (Klipper запрещает рекурсивные макросы)
[gcode_macro _LOWER_Z_SAFE]
gcode:
    {% for i in range(100) %}
        _LOWER_Z_STEP_ONCE
    {% endfor %}

[gcode_macro CHECK_Z_BOTTOM]
gcode:
    {% set triggered = printer['filament_switch_sensor z_bottom'].filament_detected %}
    RESPOND MSG="z_bottom: {'TRIGGERED' if triggered else 'open'}"

# Один шаг: двигается на 0.2мм вниз только если нижний концевик (PG11) не нажат
# filament_detected читается в момент выполнения каждого шага — актуальное состояние
[gcode_macro _LOWER_Z_STEP_ONCE]
gcode:
    {% if not printer['filament_switch_sensor z_bottom'].filament_detected %}
        G91
        G1 Z0.2 F200    ; 0.2мм вниз (Z+ = стол вниз)
        G90
    {% endif %}

# ============================================================
# Смена филамента
# ============================================================

# Загрузить филамент — нагреть, протолкнуть до хотенда и в сопло
# Вызов: LOAD_FILAMENT [TEMP=200]
[gcode_macro LOAD_FILAMENT]
description: Загрузить филамент
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    {% set cur_temp = printer.extruder.temperature|float %}

    # Нагреть если нужно
    {% if cur_temp < TEMP - 5 %}
        M109 S{TEMP}
    {% endif %}

    M118 Загрузка филамента...
    G92 E0
    G1 E50 F300     ; медленно — до хотенда
    G1 E30 F150     ; ещё медленнее — через сопло
    G92 E0
    M104 S0         ; выключить нагрев
    M118 Готово. Проверьте экструзию.

# Выгрузить филамент — нагреть, ретракт из сопла и хотенда
# Вызов: UNLOAD_FILAMENT [TEMP=200]
[gcode_macro UNLOAD_FILAMENT]
description: Выгрузить филамент
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    {% set cur_temp = printer.extruder.temperature|float %}

    # Нагреть если нужно
    {% if cur_temp < TEMP - 5 %}
        M109 S{TEMP}
    {% endif %}

    M118 Выгрузка филамента...
    G92 E0
    G1 E5 F300      ; небольшой прайм перед ретрактом
    G1 E-80 F600    ; быстро вытянуть из хотенда
    G92 E0
    M104 S0         ; выключить нагрев
    M118 Филамент выгружен. Вытащите его.

# Смена филамента во время печати (вызывается слайсером через M600)
# Паузит печать, выгружает, ждёт новый, загружает, продолжает
[gcode_macro M600]
description: Смена филамента во время печати
gcode:
    {% set X_PARK = 285 %}
    {% set Y_PARK = 0 %}
    {% set Z_LIFT = 10 %}
    {% set TEMP = printer.extruder.target|float %}

    # Сохранить состояние и паузить
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE

    # Припарковать голову
    G90
    G91
    G1 Z{Z_LIFT} F300
    G90
    G1 X{X_PARK} Y{Y_PARK} F6000

    # Выгрузить
    G92 E0
    G1 E5 F300
    G1 E-80 F600
    G92 E0

    _LED_BLUE
    M118 Смените филамент и выполните: FILAMENT_LOADED

# Вызвать после вставки нового филамента
[gcode_macro FILAMENT_LOADED]
description: Подтвердить замену — загрузить и продолжить печать
gcode:
    {% set TEMP = printer.extruder.target|float %}

    {% if TEMP < 180 %}
        M109 S200
    {% endif %}

    # Загрузить новый
    G92 E0
    G1 E60 F300
    G1 E30 F150
    G92 E0
    G4 P2000

    # Восстановить состояние и продолжить
    RESTORE_GCODE_STATE NAME=M600_state
    RESUME
    M118 Печать продолжена.
