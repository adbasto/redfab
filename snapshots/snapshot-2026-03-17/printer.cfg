[include mainsail.cfg]
[include debug.cfg]
[include core.cfg]
[include stepper.cfg]
[include macros.cfg]
# [include motor_test.cfg]  ← закомментируй

[mcu]
canbus_uuid: dde4eba60f0f

[mcu EBBCan]
canbus_uuid: 6269b37ddaba

[include ebb_can.cfg]
[include leds.cfg]

[heater_bed]
heater_pin: PA8               # FAN0 → оптопара MOC3063 → триак → 220V
sensor_pin: PF3
sensor_type: Generic 3950
control: pid
pid_Kp: 57.369
pid_Ki: 0.286
pid_Kd: 2872.015
min_temp: -100
max_temp: 130
pwm_cycle_time: 0.02          # 50 Гц (AC 220V, zero-crossing)

# Ослабить проверку скорости нагрева стола (220V, большая тепловая масса)
[verify_heater heater_bed]
max_error: 240          # допустимое накопленное отклонение
check_gain_time: 900    # секунд на начальный прогрев (15 минут)
hysteresis: 5           # допустимое отклонение от целевой температуры
heating_gain: 1         # минимальный прирост за check_gain_time

# Нижний концевик Z (ограничитель опускания стола)
# filament_detected обновляется непрерывно — читается в реальном времени в макросах
[filament_switch_sensor z_bottom]
switch_pin: ^PG11
pause_on_runout: false

# [safe_z_home] — отключён, используется homing_override в macros.cfg

[printer]
kinematics: corexy
max_velocity: 280
max_accel: 5000
max_z_velocity: 10
max_z_accel: 100

