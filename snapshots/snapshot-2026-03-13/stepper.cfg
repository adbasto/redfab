# ============================================================
# stepper.cfg
# ============================================================

[stepper_x]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: tmc5160_stepper_x:virtual_endstop  # sensorless через StallGuard
position_endstop: 0
position_min: 0
position_max: 300
homing_speed: 50
homing_retract_dist: 0   # обязательно 0 для sensorless
second_homing_speed: 50  # равна homing_speed при sensorless

[tmc5160 stepper_x]
cs_pin: PC4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0
diag1_pin: ^!PG6    # DIAG джампер на Octopus v1.1 (Driver0)
driver_SGT: 2       # подобрано: SGT=2 стабильно останавливает о стену без ложных срабатываний

# ============================================================
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: tmc5160_stepper_y:virtual_endstop  # sensorless через StallGuard
position_endstop: 350
position_min: 0
position_max: 350
homing_speed: 50
homing_retract_dist: 0   # обязательно 0 для sensorless
second_homing_speed: 50
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PD11
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0
diag1_pin: ^!PG9    # DIAG джампер на Octopus v1.1 (Driver1)
driver_SGT: 2       # подобрано: SGT=2 стабильно останавливает о стену без ложных срабатываний

# ============================================================
# Z — главный мотор (Driver2)
# ============================================================
[stepper_z]
step_pin: PF11
dir_pin: !PG3            # ! → положительное = вверх
enable_pin: !PG5
microsteps: 16
rotation_distance: 32
gear_ratio: 80:20
endstop_pin: ^PG10
position_endstop: 15.8  # концевик срабатывает когда сопло на 15.8мм выше стола
position_min: 0       # Z=0 = сопло у стола (15мм ниже концевика)
position_max: 350
homing_speed: 10
homing_retract_dist: 5
second_homing_speed: 3
homing_positive_dir: false

[tmc5160 stepper_z]
cs_pin: PC6
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# Z1 — Driver3
# ============================================================
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 32
gear_ratio: 80:20

[tmc5160 stepper_z1]
cs_pin: PC7
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# Z2 — Driver4
# ============================================================
[stepper_z2]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 32
gear_ratio: 80:20

[tmc5160 stepper_z2]
cs_pin: PF2
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# Z3 — Driver5
# ============================================================
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 32
gear_ratio: 80:20

[tmc5160 stepper_z3]
cs_pin: PE4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0
