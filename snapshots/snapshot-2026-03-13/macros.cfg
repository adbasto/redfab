# ============================================================
# macros.cfg — пользовательские макросы и homing_override
# ============================================================

# Переопределяет стандартный G28
# Последовательность:
#   1. Опустить стол на 15мм (Z+) для безопасного хоминга XY
#      Оба концевика Z на одном пине PG10 — если стол уже у нижнего упора,
#      мотор тихо стопорится (медленная скорость, TMC5160 не повреждается)
#   2. G28 X → G28 Y
#   3. Переехать под верхний Z концевик (X=9 Y=27) → G28 Z
[homing_override]
axes: xyz
set_position_z: 0   # Klipper считает Z=0 при старте хоминга (разрешает G1 Z до реального хоминга)
gcode:
    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set home_all = not home_x and not home_y and not home_z %}

    _LED_YELLOW     # жёлтый — идёт калибровка

    # Перед хомингом X или Y — опустить стол на 15мм (Z+ = стол вниз)
    # Если стол уже у нижнего концевика (PG10) — мотор остановится на физическом упоре
    {% if home_all or home_x or home_y %}
        G90
        G1 Z20 F200
    {% endif %}

    # Хоминг X
    {% if home_all or home_x %}
        G4 P1500    ; пауза 1.5 сек — StallGuard фильтр должен устояться
        G28 X
    {% endif %}

    # Хоминг Y
    {% if home_all or home_y %}
        G4 P1500
        G28 Y
    {% endif %}

    # Хоминг Z — встать под верхний концевик, поднять стол до срабатывания PG10
    {% if home_all or home_z %}
        # X=9 (9мм от левого края), Y=27 (27мм от переднего края) — под Z концевик
        G90
        G1 X9 Y27 F3000
        G28 Z
    {% endif %}

    _LED_GREEN      # зелёный — калибровка завершена, готов
