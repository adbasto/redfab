# ============================================================
# МОТОР Z0 — Driver2 (MOTOR2)
# ============================================================
[manual_stepper z0]
step_pin: PF11
dir_pin: PG3            # если крутит не туда — !PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z0]
cs_pin: PC6
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z1 — Driver3 (MOTOR3)
# ============================================================
[manual_stepper z1]
step_pin: PG4
dir_pin: PC1            # если крутит не туда — !PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z1]
cs_pin: PC7
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

