

## Порядок проверки (делай именно так!)

# **1. Проверь концевики ДО движения:**
# ```
# CHECK_ENDSTOPS
# ```
# Нажми каждый концевик рукой — он должен менять статус `open` → `TRIGGERED`

# **2. Убедись что концевики НЕ нажаты** (каретка не в углу)

# **3. Начни с малой дистанции — вручную:**
# ```
# MANUAL_STEPPER STEPPER=x MOVE=-10 SPEED=10 SYNC=1




# ============================================================
# ХОМИНГ X (CoreXY — оба мотора двигаются вместе)
# ============================================================
[gcode_macro HOME_X]
gcode:
    # Сначала включи и убедись что концевик не нажат!
    # Медленно едем к концевику X
    # X мотор (-), Y мотор (+) — проверь направление на своей машине!
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=x MOVE=-350 SPEED=20 STOP_ON_ENDSTOP=1 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=350 SPEED=20 SYNC=1
    # Откат от концевика
    MANUAL_STEPPER STEPPER=x MOVE=5 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=-5 SPEED=10 SYNC=1
    # Медленный повторный наезд
    MANUAL_STEPPER STEPPER=x MOVE=-15 SPEED=5 STOP_ON_ENDSTOP=1 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=15 SPEED=5 SYNC=1
    # Запоминаем позицию как 0
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    RESPOND MSG="X homed!"

# ============================================================
# ХОМИНГ Y
# ============================================================
[gcode_macro HOME_Y]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    # Оба мотора в (-) для движения по -Y
    MANUAL_STEPPER STEPPER=x MOVE=-350 SPEED=20 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=-350 SPEED=20 STOP_ON_ENDSTOP=1 SYNC=1
    # Откат
    MANUAL_STEPPER STEPPER=x MOVE=5 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=5 SPEED=10 SYNC=1
    # Медленный повторный наезд
    MANUAL_STEPPER STEPPER=x MOVE=-15 SPEED=5 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=-15 SPEED=5 STOP_ON_ENDSTOP=1 SYNC=1
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    RESPOND MSG="Y homed!"

# ============================================================
# ХОМИНГ Z (все 4 мотора к концевику на z0)
# ============================================================
[gcode_macro HOME_Z]
gcode:
    MANUAL_STEPPER STEPPER=z0 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z1 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z2 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z3 SET_POSITION=0
    # Едем вверх к концевику (или вниз — зависит от расположения концевика)
    MANUAL_STEPPER STEPPER=z0 MOVE=-100 SPEED=5 STOP_ON_ENDSTOP=1 SYNC=0
    MANUAL_STEPPER STEPPER=z1 MOVE=-100 SPEED=5 SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE=-100 SPEED=5 SYNC=0
    MANUAL_STEPPER STEPPER=z3 MOVE=-100 SPEED=5 SYNC=1
    # Откат
    MANUAL_STEPPER STEPPER=z0 MOVE=5 SPEED=3 SYNC=0
    MANUAL_STEPPER STEPPER=z1 MOVE=5 SPEED=3 SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE=5 SPEED=3 SYNC=0
    MANUAL_STEPPER STEPPER=z3 MOVE=5 SPEED=3 SYNC=1
    MANUAL_STEPPER STEPPER=z0 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z1 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z2 SET_POSITION=0
    MANUAL_STEPPER STEPPER=z3 SET_POSITION=0
    RESPOND MSG="Z homed!"

# ============================================================
# ПРОВЕРКА КОНЦЕВИКОВ
# ============================================================
[gcode_macro CHECK_ENDSTOPS]
gcode:
    QUERY_ENDSTOPS

