# Z_UP       # поднять на 20мм

# Z_DOWN     # опустить обратно

# Z_FREE     # отпустить моторы

# ============================================================
# МОТОР Z0 — Driver2 (MOTOR2)
# ============================================================
[manual_stepper z0]
step_pin: PF11
dir_pin: PG3            # если крутит не туда — !PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z0]
cs_pin: PC6
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z1 — Driver3 (MOTOR3)
# ============================================================
[manual_stepper z1]
step_pin: PG4
dir_pin: PC1            # если крутит не туда — !PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z1]
cs_pin: PC7
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z2 — Driver4 (MOTOR4)
# ============================================================
[manual_stepper z2]
step_pin: PF9
dir_pin: PF10           # если крутит не туда — !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z2]
cs_pin: PF2
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z3 — Driver5 (MOTOR5)
# ============================================================
[manual_stepper z3]
step_pin: PC13
dir_pin: PF0            # если крутит не туда — !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z3]
cs_pin: PE4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0


# ============================================================
# МАКРОСЫ — управление всеми Z моторами одной командой
# ============================================================
[gcode_macro Z_UP]
gcode:
    MANUAL_STEPPER STEPPER=z0 MOVE=20 SPEED=5
    MANUAL_STEPPER STEPPER=z1 MOVE=20 SPEED=5
    MANUAL_STEPPER STEPPER=z2 MOVE=20 SPEED=5
    MANUAL_STEPPER STEPPER=z3 MOVE=20 SPEED=5

[gcode_macro Z_DOWN]
gcode:
    MANUAL_STEPPER STEPPER=z0 MOVE=0 SPEED=5
    MANUAL_STEPPER STEPPER=z1 MOVE=0 SPEED=5
    MANUAL_STEPPER STEPPER=z2 MOVE=0 SPEED=5
    MANUAL_STEPPER STEPPER=z3 MOVE=0 SPEED=5

[gcode_macro Z_FREE]
gcode:
    MANUAL_STEPPER STEPPER=z0 ENABLE=0
    MANUAL_STEPPER STEPPER=z1 ENABLE=0
    MANUAL_STEPPER STEPPER=z2 ENABLE=0
    MANUAL_STEPPER STEPPER=z3 ENABLE=0