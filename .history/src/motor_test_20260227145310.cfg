# ============================================================
# МОТОР X — Driver0 (MOTOR0) — CoreXY мотор A
# ============================================================
[manual_stepper x]
step_pin: PF13
dir_pin: PF12           # если крутит не туда — !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40   # 20T шкив + GT2 ремень = 40, для 16T = 32
velocity: 50
accel: 500
endstop_pin: ^PG6       # STOP_0

[tmc5160 manual_stepper x]
cs_pin: PC4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Y — Driver1 (MOTOR1) — CoreXY мотор B
# ============================================================
[manual_stepper y]
step_pin: PG0
dir_pin: PG1            # если крутит не туда — !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
velocity: 50
accel: 500
endstop_pin: ^PG9       # STOP_1

[tmc5160 manual_stepper y]
cs_pin: PD11
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0


# ============================================================
# МОТОР Z0 — Driver2 (MOTOR2)
# ============================================================
[manual_stepper z0]
step_pin: PF11
dir_pin: PG3            # если крутит не туда — !PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50
endstop_pin: ^PG10  

[tmc5160 manual_stepper z0]
cs_pin: PC6
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z1 — Driver3 (MOTOR3)
# ============================================================
[manual_stepper z1]
step_pin: PG4
dir_pin: PC1            # если крутит не туда — !PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z1]
cs_pin: PC7
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z2 — Driver4 (MOTOR4)
# ============================================================
[manual_stepper z2]
step_pin: PF9
dir_pin: !PF10           # если крутит не туда — !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z2]
cs_pin: PF2
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z3 — Driver5 (MOTOR5)
# ============================================================
[manual_stepper z3]
step_pin: PC13
dir_pin: PF0            # если крутит не туда — !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z3]
cs_pin: PE4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0


# ============================================================
# МАКРОСЫ — управление всеми Z моторами одной командой
# 
# Поднять на 20мм
# Z_MOVE DIST=20
# 
# Опустить на 5мм
# Z_MOVE DIST=5
# 
# Поднять на 50мм со скоростью 10
# Z_MOVE DIST=50 SPEED=10
# 
# Вернуть в ноль
# Z_MOVE DIST=0 или Z_DOWN

# отпустить моторы
# Z_FREE
# ============================================================
[gcode_macro Z_MOVE]
gcode:
    {% set dist = params.DIST|default(10)|float %}
    {% set spd = params.SPEED|default(5)|float %}
    MANUAL_STEPPER STEPPER=z0 MOVE={dist} SPEED={spd} SYNC=0
    MANUAL_STEPPER STEPPER=z1 MOVE={dist} SPEED={spd} SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE={dist} SPEED={spd} SYNC=1
    

[gcode_macro Z_DOWN]
gcode:
    MANUAL_STEPPER STEPPER=z0 MOVE=0 SPEED=5 SYNC=0
    MANUAL_STEPPER STEPPER=z1 MOVE=0 SPEED=5 SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE=0 SPEED=5 SYNC=1


[gcode_macro Z_FREE]
gcode:
    MANUAL_STEPPER STEPPER=z0 ENABLE=0
    MANUAL_STEPPER STEPPER=z1 ENABLE=0
    MANUAL_STEPPER STEPPER=z2 ENABLE=0
