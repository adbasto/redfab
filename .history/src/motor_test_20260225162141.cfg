# DUMP_TMC STEPPER=x

# MANUAL_STEPPER STEPPER=x MOVE=50 SPEED=10

# MANUAL_STEPPER STEPPER=x MOVE=0 SPEED=10

# MANUAL_STEPPER STEPPER=x ENABLE=0


# ============================================================
# МОТОР X — Driver0 (MOTOR0)
# ============================================================
[manual_stepper x]
step_pin: PF13
dir_pin: PF12           # если крутит не туда — !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40   # для ремня GT2 + шкив 20 зубьев
velocity: 10
accel: 50

[tmc5160 manual_stepper x]
cs_pin: PC4
spi_bus: spi1
run_current: 1.200
sense_resistor: 0.075
stealthchop_threshold: 0