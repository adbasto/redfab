# ================================================================
#         ТЕСТОВЫЙ ФАЙЛ — ПРОВЕРКА 8 МОТОРОВ (DRIVER0-7)
#         Octopus Pro / STM32F446
# ================================================================
#
# КОМАНДЫ:
#   MOTORS_ENABLE           — включить все 8 моторов
#   MOTORS_DISABLE          — выключить все 8 моторов
#   MOTORS_FORWARD MM=10    — двинуть все вперёд на 10мм (по умолчанию)
#   MOTORS_BACKWARD MM=10   — двинуть все назад на 10мм (по умолчанию)
#   TEST_MOTOR N=0 MM=10    — тест одного мотора (N=0..7), вперёд
#   TEST_ALL                — полный тест: вперёд → назад → стоп
# ================================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_59004F000651313031393839-if00

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# ================================================================
# MOTOR 0 — Driver0
# ================================================================
[manual_stepper m0]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m0]
cs_pin: PC4
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 1 — Driver1
# ================================================================
[manual_stepper m1]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m1]
cs_pin: PD11
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 2 — Driver2
# ================================================================
[manual_stepper m2]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m2]
cs_pin: PC6
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 3 — Driver3
# ================================================================
[manual_stepper m3]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m3]
cs_pin: PC7
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 4 — Driver4
# ================================================================
[manual_stepper m4]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m4]
cs_pin: PF2
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 5 — Driver5
# ================================================================
[manual_stepper m5]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m5]
cs_pin: PE4
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 6 — Driver6
# ================================================================
[manual_stepper m6]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m6]
cs_pin: PE1
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# MOTOR 7 — Driver7
# ================================================================
[manual_stepper m7]
step_pin: PE6
dir_pin: PA14
enable_pin: !PE0
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper m7]
cs_pin: PD3
spi_bus: spi1
run_current: 1.750
sense_resistor: 0.075
stealthchop_threshold: 0

# ================================================================
# МАКРОСЫ
# ================================================================

[gcode_macro MOTORS_ENABLE]
description: Включить все 8 моторов
gcode:
    MANUAL_STEPPER STEPPER=m0 ENABLE=1
    MANUAL_STEPPER STEPPER=m1 ENABLE=1
    MANUAL_STEPPER STEPPER=m2 ENABLE=1
    MANUAL_STEPPER STEPPER=m3 ENABLE=1
    MANUAL_STEPPER STEPPER=m4 ENABLE=1
    MANUAL_STEPPER STEPPER=m5 ENABLE=1
    MANUAL_STEPPER STEPPER=m6 ENABLE=1
    MANUAL_STEPPER STEPPER=m7 ENABLE=1
    RESPOND MSG="✅ Все 8 моторов ВКЛЮЧЕНЫ"

[gcode_macro MOTORS_DISABLE]
description: Выключить все 8 моторов
gcode:
    MANUAL_STEPPER STEPPER=m0 ENABLE=0
    MANUAL_STEPPER STEPPER=m1 ENABLE=0
    MANUAL_STEPPER STEPPER=m2 ENABLE=0
    MANUAL_STEPPER STEPPER=m3 ENABLE=0
    MANUAL_STEPPER STEPPER=m4 ENABLE=0
    MANUAL_STEPPER STEPPER=m5 ENABLE=0
    MANUAL_STEPPER STEPPER=m6 ENABLE=0
    MANUAL_STEPPER STEPPER=m7 ENABLE=0
    RESPOND MSG="⛔ Все 8 моторов ВЫКЛЮЧЕНЫ"

[gcode_macro MOTORS_FORWARD]
description: Двинуть все моторы вперёд. Пример: MOTORS_FORWARD MM=20
gcode:
    {% set dist = params.MM|default(10)|float %}
    RESPOND MSG="▶ Движение ВПЕРЁД на {dist} мм"
    MANUAL_STEPPER STEPPER=m0 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m1 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m2 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m3 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m4 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m5 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m6 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m7 MOVE={dist} SPEED=10 SYNC=1

[gcode_macro MOTORS_BACKWARD]
description: Двинуть все моторы назад. Пример: MOTORS_BACKWARD MM=20
gcode:
    {% set dist = params.MM|default(10)|float %}
    RESPOND MSG="◀ Движение НАЗАД на {dist} мм"
    MANUAL_STEPPER STEPPER=m0 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m1 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m2 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m3 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m4 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m5 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m6 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=m7 MOVE=-{dist} SPEED=10 SYNC=1

[gcode_macro TEST_MOTOR]
description: Тест одного мотора. Пример: TEST_MOTOR N=3 MM=10
gcode:
    {% set n = params.N|default(0)|int %}
    {% set dist = params.MM|default(10)|float %}
    RESPOND MSG="🔧 Тест мотора M{n} — вперёд {dist} мм"
    {% if n == 0 %}
        MANUAL_STEPPER STEPPER=m0 ENABLE=1
        MANUAL_STEPPER STEPPER=m0 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m0 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m0 ENABLE=0
    {% elif n == 1 %}
        MANUAL_STEPPER STEPPER=m1 ENABLE=1
        MANUAL_STEPPER STEPPER=m1 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m1 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m1 ENABLE=0
    {% elif n == 2 %}
        MANUAL_STEPPER STEPPER=m2 ENABLE=1
        MANUAL_STEPPER STEPPER=m2 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m2 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m2 ENABLE=0
    {% elif n == 3 %}
        MANUAL_STEPPER STEPPER=m3 ENABLE=1
        MANUAL_STEPPER STEPPER=m3 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m3 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m3 ENABLE=0
    {% elif n == 4 %}
        MANUAL_STEPPER STEPPER=m4 ENABLE=1
        MANUAL_STEPPER STEPPER=m4 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m4 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m4 ENABLE=0
    {% elif n == 5 %}
        MANUAL_STEPPER STEPPER=m5 ENABLE=1
        MANUAL_STEPPER STEPPER=m5 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m5 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m5 ENABLE=0
    {% elif n == 6 %}
        MANUAL_STEPPER STEPPER=m6 ENABLE=1
        MANUAL_STEPPER STEPPER=m6 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m6 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m6 ENABLE=0
    {% elif n == 7 %}
        MANUAL_STEPPER STEPPER=m7 ENABLE=1
        MANUAL_STEPPER STEPPER=m7 MOVE={dist} SPEED=10 SYNC=0
        MANUAL_STEPPER STEPPER=m7 MOVE=-{dist} SPEED=10 SYNC=1
        MANUAL_STEPPER STEPPER=m7 ENABLE=0
    {% endif %}
    RESPOND MSG="✅ Мотор M{n} — тест завершён"

[gcode_macro TEST_ALL]
description: Полный тест всех моторов — вперёд, потом назад, потом стоп
gcode:
    {% set dist = params.MM|default(10)|float %}
    RESPOND MSG="==============================="
    RESPOND MSG="🚀 ПОЛНЫЙ ТЕСТ ВСЕХ 8 МОТОРОВ"
    RESPOND MSG="==============================="
    MOTORS_ENABLE
    G4 P500
    RESPOND MSG="▶ Шаг 1: ВПЕРЁД на {dist} мм"
    MOTORS_FORWARD MM={dist}
    G4 P2000
    RESPOND MSG="◀ Шаг 2: НАЗАД на {dist} мм"
    MOTORS_BACKWARD MM={dist}
    G4 P2000
    MOTORS_DISABLE
    RESPOND MSG="✅ ТЕСТ ЗАВЕРШЁН"
    RESPOND MSG="==============================="