[extruder]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA2             # разъём HE0
sensor_pin: PF4             # твой датчик — оставляем тот же пин
sensor_type: Generic 3950
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: -200
max_temp: 280
min_extrude_temp: 0         # пока 0 для тестов, потом верни 170

# ============================================================
# ПОДОГРЕВ СТОЛА (Heated Bed)
# ============================================================
[heater_bed]
heater_pin: PA1         # Пин MOSFET подогрева стола (разъём BED на плате)
sensor_pin: PF3         # Пин термистора стола (разъём TB на плате)
sensor_type: Generic 3950 # Тип термистора. Замени на свой, например: Generic 3950
control: watermark      # Для стола подходит watermark (простое вкл/выкл).
                        # Можно и pid — тогда откалибруй:
                        # PID_CALIBRATE HEATER=heater_bed TARGET=60
min_temp: 0
max_temp: 130           # Максимум стола. Для PEI обычно 110°C достаточно


#++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
#                 МОТОРЫ ПО Z подключены к драйверам 4-6
#++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
#
# Z_ENABLE          # включить моторы
# Z_DOWN MM=10      # опустить на 10мм
# Z_UP MM=10        # поднять на 10мм
# Z_DOWN MM=50      # опустить на 50мм
# Z_DISABLE         # выключить моторы


# ============================================================
# МОТОР Z1 — Driver4 (MOTOR4)
# ============================================================
[manual_stepper z1]
step_pin: PF9
dir_pin: PF10           # если крутит не туда — !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 8    # для ходового винта T8
velocity: 10
accel: 50

[tmc5160 manual_stepper z1]
cs_pin: PF2
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z2 — Driver5 (MOTOR5)
# ============================================================
[manual_stepper z2]
step_pin: PC13
dir_pin: PF0            # если крутит не туда — !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z2]
cs_pin: PE4
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР Z3 — Driver6 (MOTOR6)
# ============================================================
[manual_stepper z3]
step_pin: PE2
dir_pin: PE3            # если крутит не туда — !PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z3]
cs_pin: PE1
spi_bus: spi1
run_current: 1.100
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МАКРОСЫ — управление всеми тремя моторами сразу
# ============================================================
[gcode_macro Z_ENABLE]
gcode:
    MANUAL_STEPPER STEPPER=z1 ENABLE=1
    MANUAL_STEPPER STEPPER=z2 ENABLE=1
    MANUAL_STEPPER STEPPER=z3 ENABLE=1

[gcode_macro Z_DISABLE]
gcode:
    MANUAL_STEPPER STEPPER=z1 ENABLE=0
    MANUAL_STEPPER STEPPER=z2 ENABLE=0
    MANUAL_STEPPER STEPPER=z3 ENABLE=0

[gcode_macro Z_DOWN]
# Опустить стол на 10мм
gcode:
    {% set dist = params.MM|default(10)|float %}
    MANUAL_STEPPER STEPPER=z1 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE={dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=z3 MOVE={dist} SPEED=10 SYNC=1

[gcode_macro Z_UP]
# Поднять стол на 10мм
gcode:
    {% set dist = params.MM|default(10)|float %}
    MANUAL_STEPPER STEPPER=z1 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=z2 MOVE=-{dist} SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=z3 MOVE=-{dist} SPEED=10 SYNC=1


[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100



