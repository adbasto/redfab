# ============================================================
# МОТОР Z0 — Driver0 (MOTOR0)
# ============================================================
[manual_stepper z0]
step_pin: PF13
dir_pin: PF12           # если крутит не туда — !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z0]
cs_pin: PC4
spi_bus: spi1
run_current: 1.200
sense_resistor: 0.075
stealthchop_threshold: 0