# # Проверить что драйвер отвечает
# DUMP_TMC STEPPER=test_motor

# # Повернуть на 50мм вперёд
# MANUAL_STEPPER STEPPER=test_motor MOVE=50 SPEED=10

# # Повернуть назад
# MANUAL_STEPPER STEPPER=test_motor MOVE=0 SPEED=10

# # Отпустить мотор
# MANUAL_STEPPER STEPPER=test_motor ENABLE=0


# ============================================================
# МОТОР Z0 — Driver0 (MOTOR0)
# ============================================================
[manual_stepper z0]
step_pin: PF13
dir_pin: PF12           # если крутит не туда — !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 8
velocity: 10
accel: 50

[tmc5160 manual_stepper z0]
cs_pin: PC4
spi_bus: spi1
run_current: 1.200
sense_resistor: 0.075
stealthchop_threshold: 0