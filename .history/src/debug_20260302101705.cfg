
# Запускай **по одному**, каретка должна быть **в центре** перед каждым тестом:

# TEST_HOME_X

# TEST_HOME_Y

[gcode_macro TEST_HOME_X]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=x MOVE=-350 SPEED=10 STOP_ON_ENDSTOP=1 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=350 SPEED=10 SYNC=1
    RESPOND MSG="X endstop hit!"

[gcode_macro TEST_HOME_Y]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=x MOVE=-350 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=-350 SPEED=10 STOP_ON_ENDSTOP=1 SYNC=1
    RESPOND MSG="Y endstop hit!"
