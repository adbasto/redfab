[gcode_macro TEST_HOME_X]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=y MOVE=50 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=x MOVE=-50 SPEED=10 SYNC=1
    
    RESPOND MSG="X endstop hit - both stopped!"

[gcode_macro TEST_HOME_Y]
gcode:
    MANUAL_STEPPER STEPPER=x SET_POSITION=0
    MANUAL_STEPPER STEPPER=y SET_POSITION=0
    MANUAL_STEPPER STEPPER=x MOVE=-350 SPEED=10 SYNC=0
    MANUAL_STEPPER STEPPER=y MOVE=-350 SPEED=10 STOP_ON_ENDSTOP=1 SYNC=1
    
    RESPOND MSG="Y endstop hit - both stopped!"
# ```

# Логика:
# 1. Y едет в фоне `SYNC=0`
# 2. X едет и **макрос ждёт** `SYNC=1` пока не сработает концевик
# 3. Как только X остановился — следующая строка `ENABLE=0` глушит Y мгновенно
# ```
# FIRMWARE_RESTART
# TEST_HOME_X