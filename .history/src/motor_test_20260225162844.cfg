# ============================================================
# МОТОР A (X+Y) — Driver0 (MOTOR0)
# ============================================================
[manual_stepper stepper_a]
step_pin: PF13
dir_pin: PF12           # если крутит не туда — !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40   # GT2 ремень, шкив 20T
velocity: 10
accel: 50

[tmc5160 manual_stepper stepper_a]
cs_pin: PC4
spi_bus: spi1
run_current: 1.200
sense_resistor: 0.075
stealthchop_threshold: 0

# ============================================================
# МОТОР B (X-Y) — Driver1 (MOTOR1)
# ============================================================
[manual_stepper stepper_b]
step_pin: PG0
dir_pin: PG1            # если крутит не туда — !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
velocity: 10
accel: 50

[tmc5160 manual_stepper stepper_b]
cs_pin: PD11
spi_bus: spi1
run_current: 1.200
sense_resistor: 0.075
stealthchop_threshold: 0